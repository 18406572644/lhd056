<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>室内设计平面图编辑器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <canvas id="canvas-grid" class="canvas-layer"></canvas>
        <canvas id="canvas-walls" class="canvas-layer"></canvas>
        <canvas id="canvas-furniture" class="canvas-layer"></canvas>
        <canvas id="canvas-annotations" class="canvas-layer"></canvas>
        <canvas id="canvas-ui" class="canvas-layer"></canvas>

        <div class="toolbar-left">
            <div class="tool-btn" data-tool="select" title="选择工具 (V)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
                </svg>
                <span class="tool-tip">选择</span>
            </div>
            <div class="tool-btn" data-tool="wall" title="墙壁工具 (W)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 21h18M5 21V9l7-4 7 4v12M5 12h14"/>
                </svg>
                <span class="tool-tip">墙壁</span>
            </div>
            <div class="tool-btn" data-tool="room" title="房间工具 (R)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                </svg>
                <span class="tool-tip">房间</span>
            </div>
            <div class="tool-btn" data-tool="furniture" title="家具工具 (F)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="6" width="18" height="12" rx="2"/>
                    <circle cx="8" cy="12" r="1.5"/>
                    <circle cx="16" cy="12" r="1.5"/>
                </svg>
                <span class="tool-tip">家具</span>
            </div>
            <div class="tool-btn" data-tool="dimension" title="尺寸工具 (D)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12h18M6 9l-3 3 3 3M18 9l3 3-3 3"/>
                </svg>
                <span class="tool-tip">尺寸</span>
            </div>
            <div class="tool-btn" data-tool="text" title="文字工具 (T)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 7V5h16v2M12 5v14M9 19h6"/>
                </svg>
                <span class="tool-tip">文字</span>
            </div>
        </div>

        <div class="furniture-panel">
            <div class="panel-tabs">
                <div class="panel-tab active" data-panel="furniture">家具库</div>
                <div class="panel-tab" data-panel="components">我的组件</div>
            </div>

            <div class="panel-content active" id="panel-furniture">
                <div class="furniture-header">
                    <h3>家具库</h3>
                </div>
                <div class="category-tabs" id="furniture-category-tabs">
                    <div class="tab-btn active" data-category="living">客厅</div>
                    <div class="tab-btn" data-category="bedroom">卧室</div>
                    <div class="tab-btn" data-category="kitchen">厨房</div>
                    <div class="tab-btn" data-category="bathroom">卫浴</div>
                </div>
                <div class="furniture-list" id="furniture-list">
                </div>
            </div>

            <div class="panel-content" id="panel-components">
                <div class="furniture-header">
                    <h3>我的组件</h3>
                </div>
                <div class="category-tabs" id="component-category-tabs">
                </div>
                <div class="furniture-list" id="component-list">
                </div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <span class="status-label">坐标:</span>
                <span class="status-value" id="cursor-coord">X: 0.00m, Y: 0.00m</span>
            </div>
            <div class="status-item">
                <span class="status-label">缩放:</span>
                <span class="status-value" id="zoom-level">100%</span>
            </div>
            <div class="status-item">
                <span class="status-label">选中:</span>
                <span class="status-value" id="selection-info">无</span>
            </div>
            <div class="status-item color-status-item" id="color-status-item" style="display: none;">
                <span class="status-label">颜色:</span>
                <div class="color-preview" id="color-preview"></div>
                <span class="status-value color-hex" id="color-hex-value">#ffffff</span>
            </div>
        </div>

        <div class="color-panel" id="color-panel" style="display: none;">
            <div class="color-panel-header">
                <h4>家具颜色</h4>
                <button class="color-panel-close" id="color-panel-close">&times;</button>
            </div>
            <div class="color-section">
                <div class="color-section-title">常用色板</div>
                <div class="color-preset-grid" id="color-preset-grid"></div>
            </div>
            <div class="color-section">
                <div class="color-section-title">自定义颜色</div>
                <div class="custom-color-row">
                    <input type="color" id="custom-color-picker" value="#a8d8ea">
                    <input type="text" id="custom-color-input" value="#a8d8ea" maxlength="7">
                </div>
            </div>
            <div class="color-section">
                <button class="batch-color-btn" id="batch-color-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                    </svg>
                    批量修改同类型家具颜色
                </button>
            </div>
        </div>

        <div class="zoom-control">
            <button class="zoom-btn" id="zoom-out" title="缩小">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </button>
            <button class="zoom-percent-btn" id="zoom-percent" title="点击输入缩放比例">100%</button>
            <button class="zoom-btn" id="zoom-in" title="放大">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </button>
            <div class="zoom-divider"></div>
            <button class="zoom-btn" id="zoom-reset" title="重置为100%">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12a9 9 0 1 0 9-9"/>
                    <path d="M3 4v5h5"/>
                </svg>
            </button>
            <button class="zoom-btn" id="zoom-fit" title="适应画布">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
                    <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
                    <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
                    <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
                </svg>
            </button>
        </div>

        <div class="zoom-input-overlay" id="zoom-input-overlay" style="display: none;">
            <div class="zoom-input-modal">
                <input type="number" id="zoom-input-value" min="25" max="400" value="100">
                <span class="zoom-input-suffix">%</span>
            </div>
        </div>

        <button class="export-btn" id="export-btn" title="导出PNG">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            <span>导出PNG</span>
        </button>
    </div>

    <script src="js/data/furnitureLibrary.js"></script>
    <script src="js/store.js"></script>
    <script src="js/coordinates.js"></script>
    <script src="js/commands.js"></script>
    <script src="js/utils/collision.js"></script>
    <script src="js/utils/snap.js"></script>
    <script src="js/utils/export.js"></script>
    <script src="js/renderers/gridRenderer.js"></script>
    <script src="js/renderers/wallRenderer.js"></script>
    <script src="js/renderers/furnitureRenderer.js"></script>
    <script src="js/renderers/annotationRenderer.js"></script>
    <script src="js/renderers/uiRenderer.js"></script>
    <script src="js/tools/select.js"></script>
    <script src="js/tools/wall.js"></script>
    <script src="js/tools/room.js"></script>
    <script src="js/tools/furniture.js"></script>
    <script src="js/tools/dimension.js"></script>
    <script src="js/tools/text.js"></script>
    <script src="js/tools/componentLibrary.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
